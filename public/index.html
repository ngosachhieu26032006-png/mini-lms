<!DOCTYPE html>
<html>
<head>
  <title>Quiz App</title>
</head>
<body>

<h2>Add Quiz</h2>

<input placeholder="Question"><br><br>
<input placeholder="Option 1"><br>
<input placeholder="Option 2"><br>
<input placeholder="Option 3"><br><br>
<input placeholder="Correct (0,1,2)"><br><br>

<button onclick="addQuiz()">Add Quiz</button>

<hr>

<h2>Quiz</h2>
<button onclick="loadQuiz()">Load Quiz</button>

<ul id="quiz"></ul>

<script>
async function addQuiz() {
  const inputs = document.querySelectorAll("input");

  const question = inputs[0].value;
  const options = [inputs[1].value, inputs[2].value, inputs[3].value];
  const correct = Number(inputs[4].value);

  await fetch("http://localhost:3000/quiz", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ question, options, correct })
  });

  alert("Đã thêm quiz!");
}

async function loadQuiz() {
  const res = await fetch("http://localhost:3000/quiz");
  const data = await res.json();

  const ul = document.getElementById("quiz");
  ul.innerHTML = "";

  data.forEach(q => {
    const li = document.createElement("li");

    li.innerHTML = `
      <div>
        <p><b>${q.question}</b></p>
        ${q.options.map((o, i) => `
          <button onclick="check(${i}, ${q.correct})">${o}</button>
        `).join("")}
      </div>
      <hr>
    `;

    ul.appendChild(li);
  });
}

function check(selected, correct) {
  if (selected == correct) alert("🎉 Đúng!");
  else alert("❌ Sai!");
}
</script>

</body>
</html>
